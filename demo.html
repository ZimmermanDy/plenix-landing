<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda tu asesoría gratuita | Plenix</title>
<meta name="description" content="Agenda una asesoría gratuita con el equipo de Plenix y descubre cómo centralizar el conocimiento de tu empresa.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08070e;
    --panel:#0f0e17;
    --panel-2:#121119;
    --border:rgba(255,255,255,0.08);
    --border-strong:rgba(255,255,255,0.14);
    --text:#f5f5f5;
    --muted:#b0b0b0;
    --muted-2:#7a7a85;
    --blue:#0059ff;
    --blue-hover:#1a6bff;
    --teal:#4fd8c4;
    --radius-pill:48px;
    --container:1180px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}

  body{
    background:var(--bg);
    color:var(--text);
    font-family:"Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  a{text-decoration:none; color:inherit;}
  img{max-width:100%; display:block;}

  /* ---------- NAV (matches home) ---------- */
  header{
    position:sticky;
    top:0;
    z-index:100;
    background:rgba(8,7,14,0.75);
    backdrop-filter:blur(12px);
  }
  .nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 32px;
    max-width:var(--container);
    margin:0 auto;
  }
  .logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
    font-weight:600;
    letter-spacing:-0.3px;
  }
  .logo-mark{ width:26px; height:26px; display:block; }
  .back-link{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:15px;
    color:var(--muted);
    transition:color .15s ease;
  }
  .back-link:hover{ color:var(--text); }

  /* ---------- DEMO HERO (blue gradient, per reference) ---------- */
  .demo-hero{
    position:relative;
    padding:96px 32px 160px;
    text-align:center;
    overflow:hidden;
    background:linear-gradient(135deg, #4d78ff 0%, #2a52f0 45%, #1c3fd6 100%);
  }
  .demo-hero::before{
    content:"";
    position:absolute;
    top:-120px;
    right:-120px;
    width:520px;
    height:520px;
    background:radial-gradient(circle, rgba(255,255,255,0.16) 0%, transparent 70%);
    pointer-events:none;
  }
  .demo-hero::after{
    content:"";
    position:absolute;
    bottom:-160px;
    left:-140px;
    width:480px;
    height:480px;
    background:radial-gradient(circle, rgba(79,216,196,0.18) 0%, transparent 70%);
    pointer-events:none;
  }
  .demo-hero-inner{ position:relative; max-width:640px; margin:0 auto; }
  .demo-hero h1{
    font-family:"Inter Tight","Inter",sans-serif;
    font-size:48px;
    font-weight:700;
    letter-spacing:-1.4px;
    line-height:1.1;
    color:#fff;
  }
  .demo-hero p.subhead{
    margin-top:18px;
    font-size:17px;
    line-height:1.6;
    color:rgba(255,255,255,0.85);
  }
  .badges{
    margin-top:28px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
  }
  .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:9px 18px;
    border-radius:var(--radius-pill);
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.22);
    color:#fff;
    font-size:14px;
    font-weight:500;
  }

  /* ---------- FORM CARD ---------- */
  .form-wrap{
    max-width:620px;
    margin:-96px auto 0;
    padding:0 32px;
    position:relative;
  }
  .form-card{
    background:#ffffff;
    border-radius:28px;
    padding:44px;
    box-shadow:0 30px 80px rgba(8,7,14,0.45);
  }
  .field{
    position:relative;
    margin-bottom:16px;
  }
  .field input,
  .field select{
    width:100%;
    padding:16px 18px 16px 48px;
    border-radius:14px;
    border:1.5px solid #e2e5ee;
    background:#fff;
    font-family:"Inter",sans-serif;
    font-size:15px;
    color:#1a1a2e;
    outline:none;
    transition:border-color .15s ease;
  }
  .field input::placeholder{ color:#9aa0b4; }
  .field input:focus,
  .field select:focus{ border-color:var(--blue); }
  .field .field-icon{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    color:#9aa0b4;
    display:flex;
  }
  .field-optional-label{
    font-size:12px;
    color:#9aa0b4;
    margin-bottom:6px;
    display:block;
  }
  .phone-row{
    display:flex;
    gap:10px;
    margin-bottom:16px;
  }
  .country-select{
    flex:0 0 110px;
    display:flex;
    align-items:center;
    gap:6px;
    padding:0 12px;
    border-radius:14px;
    border:1.5px solid #e2e5ee;
    background:#fff;
    transition:border-color .15s ease;
  }
  .country-select:focus-within{ border-color:var(--blue); }
  .country-select .flag{
    font-size:16px;
    line-height:1;
    flex-shrink:0;
  }
  .country-select select{
    flex:1;
    border:none;
    padding:16px 4px;
    appearance:none;
    cursor:pointer;
    min-width:0;
  }
  .country-select select:focus{ outline:none; }
  .phone-row .field{ flex:1; margin-bottom:0; }

  .submit-btn{
    width:100%;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:17px 24px;
    border-radius:14px;
    border:none;
    background:linear-gradient(135deg, var(--blue) 0%, #2a52f0 100%);
    color:#fff;
    font-family:"Inter",sans-serif;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:opacity .15s ease;
    margin-top:8px;
  }
  .submit-btn:hover{ opacity:0.92; }
  .legal{
    margin-top:18px;
    text-align:center;
    font-size:13px;
    color:#9aa0b4;
  }
  .legal a{ color:#4d78ff; text-decoration:underline; }

  .honeypot{ position:absolute; left:-9999px; }

  /* ---------- FOOTER (matches home) ---------- */
  footer{
    border-top:1px solid var(--border);
    padding:60px 32px 40px;
  }
  .footer-copy{
    max-width:var(--container);
    margin:0 auto;
    font-size:13px;
    color:var(--muted-2);
    text-align:center;
  }

  @media (max-width:640px){
    .demo-hero h1{ font-size:34px; letter-spacing:-1px; }
    .form-card{ padding:28px; }
    .form-wrap{ margin-top:-72px; }
    .phone-row{ flex-direction:column; }
    .country-select{ flex:none; }
  }
</style>
</head>
<body>

<header>
  <nav class="nav">
    <a href="index.html" class="logo">
      <svg class="logo-mark" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#8CF5C7"/>
            <stop offset="100%" stop-color="#1FAE7A"/>
          </linearGradient>
        </defs>
        <path d="M4 8 L28 8 L20 15 L28 15 L20 22 L28 22 L16 30 L4 22 L12 22 L4 15 L12 15 Z" fill="url(#logoGrad)"/>
      </svg>
      Plenix
    </a>
    <a href="index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      Volver al inicio
    </a>
  </nav>
</header>

<main>
  <section class="demo-hero">
    <div class="demo-hero-inner">
      <h1>Agenda tu asesoría gratuita</h1>
      <p class="subhead">Déjanos tus datos y elige un horario para hablar con nuestro equipo.</p>
      <div class="badges">
        <span class="badge">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg>
          Implementación en días
        </span>
        <span class="badge">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/></svg>
          2 meses de garantía
        </span>
      </div>
    </div>
  </section>

  <div class="form-wrap">
    <div class="form-card">
      <form name="agenda-demo" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/gracias.html">
        <input type="hidden" name="form-name" value="agenda-demo">
        <p class="honeypot"><label>No llenar: <input name="bot-field"></label></p>

        <div class="field">
          <span class="field-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
          </span>
          <input type="text" name="nombre" placeholder="Juan Pérez" required>
        </div>

        <div class="field">
          <span class="field-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
          </span>
          <input type="email" name="email" placeholder="nombre@empresa.com" required>
        </div>

        <div class="phone-row">
          <div class="country-select">
            <span class="flag">🇨🇱</span>
            <select name="codigo_pais" aria-label="Código de país">
              <option value="+56" selected>+56</option>
              <option value="+54">+54</option>
              <option value="+57">+57</option>
              <option value="+51">+51</option>
              <option value="+52">+52</option>
              <option value="+34">+34</option>
              <option value="+1">+1</option>
            </select>
          </div>
          <div class="field">
            <span class="field-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .3 2 .7 3a2 2 0 0 1-.4 2.1L8 10.3a16 16 0 0 0 6 6l1.5-1.4a2 2 0 0 1 2.1-.4c1 .4 2 .6 3 .7a2 2 0 0 1 1.7 2z"/></svg>
            </span>
            <input type="tel" name="telefono" placeholder="9 8765 4321" required>
          </div>
        </div>

        <div class="field" style="margin-top:16px;">
          <span class="field-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.9"/><path d="M16 3.1a4 4 0 0 1 0 7.8"/></svg>
          </span>
          <input type="text" name="tamano_empresa" placeholder="Ej: 25 personas en tu empresa">
        </div>

        <div class="field">
          <span class="field-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 9a3 3 0 0 1 0 6v3a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-3a3 3 0 0 1 0-6V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/><path d="M13 5v14" stroke-dasharray="2 2"/></svg>
          </span>
          <input type="text" name="codigo_referido" placeholder="Código de referidos (opcional). Ej: AAAZZZ1">
        </div>

        <button type="submit" class="submit-btn">
          Agendar mi asesoría
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14"/><path d="M13 5l7 7-7 7"/></svg>
        </button>

        <p class="legal">Al continuar aceptas nuestra <a href="index.html#">Política de Privacidad</a>.</p>
      </form>
    </div>
  </div>

  <div style="height:100px;"></div>
</main>

<footer>
  <div class="footer-copy">© 2026 Plenix. Todos los derechos reservados.</div>
</footer>

</body>
</html>
